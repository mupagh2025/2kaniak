name: projekt
on: push
jobs:
  pdf:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - run: pip install ipykernel scipy pint open_atmos_jupyter_utils numpy PyMPDATA matplotlib tabulate nbconvert
      - run: sudo apt-get update && sudo apt-get install -y texlive-xetex texlive-latex-extra inkscape pandoc
      - run: pip install nbconvert
      - run: jupyter nbconvert --to latex --execute project2.ipynb --TemplateExporter.exclude_input=True
      - run: |

          sed -i '/\\title{/d'      project2.tex
          sed -i '/\\author{/d'     project2.tex
          sed -i '/\\date{/d'       project2.tex
          sed -i '/\\maketitle/d'   project2.tex

          sed -i '/HBox(children=/d' project2.tex

          sed -i '0,/\\begin{document}/s//\\begin{document}\n\\fontsize{10pt}{12pt}\\selectfont\n\\title{Jak powstaje fala tsunami w wyniku trzęsienia ziemii?}\n\\author{Kamil Kania}\n\\date{}\n\\maketitle\n/' project2.tex

          xelatex -interaction=nonstopmode project2.tex
          xelatex -interaction=nonstopmode project2.tex
      

      - uses: actions/upload-artifact@v4
        with:
          name: tsunami_kania
          path: |
            tsunami_kania.pdf



